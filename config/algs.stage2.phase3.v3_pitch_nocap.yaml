# Stage-2 Phase-3 (v3 pitch nocap 线): 从 pitch_nocap@1k 续训，y∈[-5,5]
algorithm: PPO
load_path: "./model/stage2_phase2_v3_pitch_nocap/ppo_combat_p2_v3_pitch_nocap_1000_steps.zip"
reset_pitch_head_on_load: false
reset_yaw_head_on_load: false
total_timesteps: 30000
reset_num_timesteps: true
log_interval: 1
progress_bar: true

log_dir: "./logs/stage2_phase3_v3_pitch_nocap/"
model_dir: "./model/stage2_phase3_v3_pitch_nocap/"
reward_components_csv: "./logs/stage2_phase3_v3_pitch_nocap/reward_components.csv"

checkpoint:
  save_freq: 1000
  name_prefix: "ppo_combat_p3_v3_pitch_nocap"

device: auto

ppo:
  learning_rate: 5.0e-5
  n_steps: 768
  batch_size: 256
  n_epochs: 3
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.05
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]
    ortho_init: false
    log_std_init: -1.0
