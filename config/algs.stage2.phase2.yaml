# Stage-2 Phase-2: 解锁 yaw，续训 phase1 最佳/最终 ckpt
algorithm: PPO
load_path: "./model/stage2_phase1/ppo_combat_p1_30000_steps.zip"
total_timesteps: 80000
reset_num_timesteps: false
log_interval: 1
progress_bar: true

log_dir: "./logs/stage2_phase2/"
model_dir: "./model/stage2_phase2/"
reward_components_csv: "./logs/stage2_phase2/reward_components.csv"

checkpoint:
  save_freq: 5000
  name_prefix: "ppo_combat_p2"

device: auto

ppo:
  learning_rate: 1.0e-4
  n_steps: 512
  batch_size: 256
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.05
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]
    ortho_init: false
