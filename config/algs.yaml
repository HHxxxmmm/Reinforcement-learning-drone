# PPO 训练超参（阶段 2）
algorithm: PPO
total_timesteps: 20000
reset_num_timesteps: true
log_interval: 1
progress_bar: true

log_dir: "./logs/single_training/"
model_dir: "./model/"
reward_components_csv: "./logs/reward_components.csv"

checkpoint:
  save_freq: 5000
  name_prefix: "ppo_simple"

device: auto   # auto | cpu | cuda

ppo:
  learning_rate: 2.0e-4
  n_steps: 512
  batch_size: 256
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.003
  vf_coef: 0.6
  max_grad_norm: 0.5
  target_kl: 0.02
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]
    ortho_init: false
