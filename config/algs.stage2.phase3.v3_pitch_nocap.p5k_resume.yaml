# Stage-2 Phase-3 v3 pitch nocap: 从 @5k 短续训（保守 PPO，+y 偏置 + pitch 惩罚）
algorithm: PPO
load_path: "./model/stage2_phase3_v3_pitch_nocap/ppo_combat_p3_v3_pitch_nocap_5000_steps.zip"
reset_pitch_head_on_load: false
reset_yaw_head_on_load: false
total_timesteps: 5000
reset_num_timesteps: false
log_interval: 1
progress_bar: true

log_dir: "./logs/stage2_phase3_v3_pitch_nocap_p5k_resume/"
model_dir: "./model/stage2_phase3_v3_pitch_nocap_p5k_resume/"
reward_components_csv: "./logs/stage2_phase3_v3_pitch_nocap_p5k_resume/reward_components.csv"

checkpoint:
  save_freq: 1000
  name_prefix: "ppo_combat_p3_v3_pitch_nocap_p5k_resume"

device: auto

ppo:
  learning_rate: 2.0e-5
  n_steps: 768
  batch_size: 256
  n_epochs: 2
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.06
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]
    ortho_init: false
    log_std_init: -1.0
