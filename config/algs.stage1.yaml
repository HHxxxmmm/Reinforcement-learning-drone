# Stage-1 v3: 2.5° 对准 + 动态超时 + hold 课程
algorithm: PPO
total_timesteps: 80000
reset_num_timesteps: true
log_interval: 1
progress_bar: true

log_dir: "./logs/stage1_align_v3/"
model_dir: "./model/stage1_align_v3/"
reward_components_csv: "./logs/stage1_align_v3/reward_components.csv"

checkpoint:
  save_freq: 5000
  name_prefix: "ppo_align1_v3"

device: auto

ppo:
  learning_rate: 2.0e-4
  n_steps: 512
  batch_size: 256
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.001
  vf_coef: 0.3
  max_grad_norm: 0.5
  target_kl: 0.05
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]
    ortho_init: false
    log_std_init: -1.0
