# Stage-2: combat 续训自 stage1 40000 ckpt
algorithm: PPO
load_path: "./model/stage1_align_v3/ppo_align1_v3_40000_steps.zip"
total_timesteps: 100000
reset_num_timesteps: false
log_interval: 1
progress_bar: true

log_dir: "./logs/stage2_combat/"
model_dir: "./model/stage2_combat/"
reward_components_csv: "./logs/stage2_combat/reward_components.csv"

checkpoint:
  save_freq: 5000
  name_prefix: "ppo_combat_s2"

device: auto

ppo:
  learning_rate: 1.0e-4
  n_steps: 512
  batch_size: 256
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.05
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]
    ortho_init: false
