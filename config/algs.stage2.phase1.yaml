# Stage-2 Phase-1: 从零训练，只学油门接敌（不加载 stage1）
algorithm: PPO
total_timesteps: 60000
reset_num_timesteps: true
log_interval: 1
progress_bar: true

log_dir: "./logs/stage2_phase1/"
model_dir: "./model/stage2_phase1/"
reward_components_csv: "./logs/stage2_phase1/reward_components.csv"

checkpoint:
  save_freq: 5000
  name_prefix: "ppo_combat_p1"

device: auto

ppo:
  learning_rate: 2.0e-4
  n_steps: 512
  batch_size: 256
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.003
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.05
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]
    ortho_init: false
    log_std_init: -1.0
